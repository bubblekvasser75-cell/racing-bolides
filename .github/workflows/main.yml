name: Build mod

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Build
        run: gradle build --no-daemon --stacktrace

      - name: Upload built jar(s)
        uses: actions/upload-artifact@v4
        with:
          name: racing-bolides-jar
          path: build/libs/*.jar
          if-no-files-found: error
